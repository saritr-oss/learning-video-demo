<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Player</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- HEADER -->
    <header id="header">
      <img id="logo" src="assets/logo.png" alt="PAiDeVo" />
      <span id="course-title"></span>
      <span id="slide-counter"></span>
    </header>

    <!-- BODY LAYOUT: left 1/3 + right 2/3 -->
    <div id="layout">

      <!-- LEFT PANEL -->
      <aside id="left-panel">

        <!-- Avatar video slot (always present, shown/hidden per slide type) -->
        <div id="avatar-slot">
          <video id="avatar-video" playsinline preload="auto"></video>
        </div>

        <!-- Navigation -->
        <nav id="nav-panel">
          <ul id="nav-list"></ul>
        </nav>

      </aside>

      <!-- RIGHT PANEL -->
      <section id="right-panel">

        <!-- Main content area -->
        <div id="content-area">

          <!-- Course video (shown when main.type = "video") -->
          <video id="main-video" playsinline preload="auto"></video>

          <!-- Slide image (shown when main.type = "image") -->
          <img id="main-image" alt="Slide" />


</div><!-- /#content-area -->

        <!-- Custom controls bar -->
        <div id="controls-bar">
          <button id="btn-prev"  class="ctrl-btn" title="Previous (←)">&#9664;&#9664;</button>
          <button id="btn-play"  class="ctrl-btn play-btn" title="Play / Pause (Space)">&#9654;</button>
          <button id="btn-next"  class="ctrl-btn" title="Next (→)">&#9654;&#9654;</button>

          <div id="progress-track" title="Click to seek">
            <div id="progress-fill"></div>
            <div id="progress-thumb"></div>
          </div>

          <span id="time-display">0:00 / 0:00</span>

          <div id="vol-wrap">
            <button id="btn-mute" class="ctrl-btn" title="Mute">&#128266;</button>
            <input id="vol-slider" type="range" min="0" max="1" step="0.02" value="1" />
          </div>
        </div>

      </section><!-- /#right-panel -->
    </div><!-- /#layout -->

  </div><!-- /#app -->

  <script src="course.js"></script>
  <script src="player.js"></script>
</body>
</html>
